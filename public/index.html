<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Communication Study</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 700px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; }
        header { padding: 20px; background: #004a99; color: white; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #dee2e6; white-space: pre-wrap; }
        #feedback-area { padding: 15px; background: #fff9c4; border-top: 1px solid #ffe082; text-align: center; display: none; }
        #feedback-area button { margin: 0 10px; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #4caf50; color: white; }
        .btn-confused { background: #f44336; color: white; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; background: white; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        #send-btn { margin-left: 10px; padding: 10px 20px; background: #004a99; color: white; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <strong>Technical Assistant</strong>
            <div style="font-size: 0.8em; opacity: 0.9;">Research Study Mode</div>
        </header>
        
        <div id="chat-box"></div>

        <div id="feedback-area">
            <span>How was that explanation?</span>
            <button class="btn-clear" onclick="sendFeedback('clear')">Clear</button>
            <button class="btn-confused" onclick="sendFeedback('confused')">Confused</button>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask a question about the manual..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = "sess_" + Date.now();
        let history = [];
        let lastAiMessage = "";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            document.getElementById('feedback-area').style.display = 'none';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, history })
                });

                const data = await response.json();
                appendMessage('ai', data.reply);
                lastAiMessage = data.reply;
                
                history.push({ role: "user", content: text });
                history.push({ role: "assistant", content: data.reply });
                
                document.getElementById('feedback-area').style.display = 'block';
            } catch (err) {
                appendMessage('ai', "Error connecting to server. Ensure your backend is running.");
            }
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        async function sendFeedback(type) {
            await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, feedback: type, lastMessage: lastAiMessage })
            });
            document.getElementById('feedback-area').style.display = 'none';
        }
    </script>
</body>
</html>
