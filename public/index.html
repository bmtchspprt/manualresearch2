<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition C: AI-Mediated Documentation</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 800px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 90vh; }
        header { padding: 25px; background: #2c3e50; color: white; text-align: center; border-radius: 8px 8px 0 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: #fafafa; }
        .message { padding: 15px 20px; border-radius: 10px; max-width: 85%; font-size: 16px; line-height: 1.6; }
        .user { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai { background: #ffffff; color: #333; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #e0e0e0; }
        #typing { padding: 0 30px 10px; font-size: 14px; color: #888; display: none; }
        #feedback-area { padding: 20px; background: #fcf8e3; border-top: 1px solid #faebcc; text-align: center; display: none; }
        button { padding: 10px 25px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin: 0 10px; }
        .btn-clear { background: #27ae60; color: white; }
        .btn-confused { background: #c0392b; color: white; }
        #input-area { padding: 25px; border-top: 1px solid #eee; display: flex; }
        #user-input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; outline: none; }
        #send-btn { margin-left: 15px; padding: 0 30px; background: #2c3e50; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <div style="font-size: 1.4em; letter-spacing: 1px;">TECHNICAL ASSISTANT</div>
            <div style="font-size: 0.9em; margin-top: 5px; color: #bdc3c7;">Adaptive GPT-Assisted Condition</div>
        </header>
        
        <div id="chat-box"></div>
        <div id="typing">Assistant is generating response...</div>

        <div id="feedback-area">
            <span style="margin-right: 15px;">Was that explanation clear?</span>
            <button class="btn-clear" onclick="sendFeedback('clear')">Clear</button>
            <button class="btn-confused" onclick="sendFeedback('confused')">Confused</button>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter your question here..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = "PARTICIPANT_" + Date.now();
        let history = [];
        let lastAiMessage = "";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            document.getElementById('typing').style.display = 'block';
            document.getElementById('feedback-area').style.display = 'none';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, sessionId, history })
            });

            const data = await response.json();
            document.getElementById('typing').style.display = 'none';
            
            const reply = data.reply || "Error retrieving response.";
            appendMessage('ai', reply);
            lastAiMessage = reply;
            
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: reply });
            
            document.getElementById('feedback-area').style.display = 'block';
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        async function sendFeedback(type) {
            await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, feedback: type })
            });
            document.getElementById('feedback-area').style.display = 'none';
        }

        window.onload = () => {
            appendMessage('ai', "System Initialized. I am ready to help you with the technical manual. How can I assist you with the first task?");
        };
    </script>
</body>
</html>
