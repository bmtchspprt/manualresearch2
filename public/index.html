<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Assistant | Research</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 800px; background: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        header { padding: 20px; background: #2c3e50; color: white; text-align: center; border-radius: 8px 8px 0 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { background: #3498db; color: white; align-self: flex-end; }
        .ai { background: #ecf0f1; color: #2c3e50; align-self: flex-start; border: 1px solid #dcdde1; }
        #feedback-area { padding: 15px; background: #f9f9f9; border-top: 1px solid #eee; text-align: center; display: none; }
        button { padding: 8px 20px; border-radius: 4px; border: none; cursor: pointer; margin: 0 5px; }
        .btn-clear { background: #27ae60; color: white; }
        .btn-confused { background: #e74c3c; color: white; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        #send-btn { margin-left: 10px; padding: 10px 20px; background: #2c3e50; color: white; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <strong>Technical Assistant</strong><br>
            <small>Research Condition: Adaptive GPT</small>
        </header>
        <div id="chat-box"></div>
        <div id="feedback-area">
            <span>Was that clear?</span>
            <button class="btn-clear" onclick="sendFeedback('clear')">Clear</button>
            <button class="btn-confused" onclick="sendFeedback('confused')">Confused</button>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your question..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = "SESS_" + Date.now();
        let history = [];

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            document.getElementById('feedback-area').style.display = 'none';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, history })
                });

                const data = await response.json();
                appendMessage('ai', data.reply);
                
                history.push({ role: "user", content: text });
                history.push({ role: "assistant", content: data.reply });
                document.getElementById('feedback-area').style.display = 'block';
            } catch (err) {
                appendMessage('ai', "Fatal Error: Could not connect to the research server.");
            }
        }

        async function sendFeedback(type) {
            fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, feedback: type })
            });
            document.getElementById('feedback-area').style.display = 'none';
        }

        window.onload = () => appendMessage('ai', "Hello. I am ready to assist with the manual. How can I help?");
    </script>
</body>
</html>
