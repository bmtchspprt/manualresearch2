<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Assistant | Research Study</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 700px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; }
        header { padding: 20px; background: #004a99; color: white; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #ffffff; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 15px; position: relative; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #f1f3f4; color: #202124; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e0e0e0; white-space: pre-wrap; }
        .typing { font-style: italic; color: #777; font-size: 13px; margin-bottom: 10px; display: none; }
        #feedback-area { padding: 15px; background: #fff9c4; border-top: 1px solid #ffe082; text-align: center; display: none; }
        #feedback-area button { margin: 0 10px; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-clear { background: #28a745; color: white; }
        .btn-confused { background: #dc3545; color: white; }
        #input-area { padding: 20px; border-top: 1px solid #eee; display: flex; background: white; }
        #user-input { flex: 1; padding: 12px 20px; border: 1px solid #dfe1e5; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { margin-left: 10px; padding: 10px 25px; background: #004a99; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <div style="font-size: 1.2em; font-weight: bold;">Technical Assistant</div>
            <div style="font-size: 0.8em; opacity: 0.8;">Cognitive Load Research Study</div>
        </header>
        
        <div id="chat-box"></div>
        <div id="typing-indicator" style="padding-left: 20px;" class="typing">Assistant is thinking...</div>

        <div id="feedback-area">
            <span style="font-size: 14px; margin-right: 10px;">Was this explanation clear?</span>
            <button class="btn-clear" onclick="sendFeedback('clear')">Clear</button>
            <button class="btn-confused" onclick="sendFeedback('confused')">Confused</button>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask about the manual..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = "sess_" + Math.random().toString(36).substr(2, 9);
        let history = [];
        let lastAiMessage = "";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const typing = document.getElementById('typing-indicator');
            const text = input.value.trim();
            
            if (!text) return;

            // UI Updates
            appendMessage('user', text);
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            typing.style.display = 'block';
            document.getElementById('feedback-area').style.display = 'none';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, history })
                });

                const data = await response.json();
                const aiReply = data.reply || "Error: No response from AI.";
                
                appendMessage('ai', aiReply);
                lastAiMessage = aiReply;
                
                // Track conversation history
                history.push({ role: "user", content: text });
                history.push({ role: "assistant", content: aiReply });
                
                document.getElementById('feedback-area').style.display = 'block';
            } catch (err) {
                appendMessage('ai', "SYSTEM ERROR: Could not connect to the server.");
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                typing.style.display = 'none';
                input.focus();
            }
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerText = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        async function sendFeedback(type) {
            await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, feedback: type, lastMessage: lastAiMessage })
            });
            document.getElementById('feedback-area').style.display = 'none';
        }
        
        // Initial Greeting
        window.onload = () => {
            appendMessage('ai', "Hello. I am here to help you with the Binventory manual. What would you like to know?");
        };
    </script>
</body>
</html>
