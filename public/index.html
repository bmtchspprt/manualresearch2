<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Condition C: AI-Mediated Documentation</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; justify-content: center; padding: 20px; }
        #app { width: 100%; max-width: 800px; background: white; border-radius: 8px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: #34495e; color: white; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { background: #3498db; color: white; align-self: flex-end; }
        .ai { background: #ecf0f1; align-self: flex-start; border: 1px solid #bdc3c7; }
        #feedback { padding: 15px; background: #f1c40f33; text-align: center; display: none; }
        #input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-left: 10px; padding: 10px 20px; background: #2c3e50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <header><strong>TECHNICAL ASSISTANT</strong><br>Research Condition: Adaptive GPT</header>
        <div id="chat"></div>
        <div id="feedback">
            Was that helpful? 
            <button onclick="sendFeedback('clear')">Clear</button>
            <button onclick="sendFeedback('confused')">Confused</button>
        </div>
        <div id="input-area">
            <input type="text" id="userIn" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        const sID = "P_" + Date.now();
        let hist = [];

        function addMsg(role, txt) {
            const box = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            d.innerText = txt;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('userIn');
            const val = i.value.trim();
            if(!val) return;
            
            addMsg('user', val);
            i.value = '';
            document.getElementById('feedback').style.display = 'none';

            try {
                const r = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val, sessionId: sID, history: hist})
                });
                const d = await r.json();
                const reply = d.reply || "Connection reset. Please try again.";
                addMsg('ai', reply);
                hist.push({role: "user", content: val}, {role: "model", content: reply});
                document.getElementById('feedback').style.display = 'block';
            } catch (e) {
                addMsg('ai', "System timeout. Please wait a moment and try again.");
            }
        }

        async function sendFeedback(f) {
            fetch('/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId: sID, feedback: f})
            });
            document.getElementById('feedback').style.display = 'none';
        }

        window.onload = () => addMsg('ai', "System ready. How can I help with the current task?");
    </script>
</body>
</html>
