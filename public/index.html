<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Condition C: Adaptive Layer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { width: 100%; max-width: 850px; background: white; border-radius: 12px; height: 92vh; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { padding: 20px; background: #263238; color: white; text-align: center; border-radius: 12px 12px 0 0; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 20px; border-radius: 20px; max-width: 80%; font-size: 16px; line-height: 1.5; }
        .user { background: #00796b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #f5f5f5; color: #263238; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #cfd8dc; }
        .typing { font-size: 13px; color: #90a4ae; margin-left: 25px; display: none; padding-bottom: 10px; }
        #feedback { padding: 15px; background: #fffde7; text-align: center; display: none; border-top: 1px solid #fff9c4; }
        #input-area { padding: 25px; display: flex; border-top: 1px solid #eee; }
        #query { flex: 1; padding: 15px; border: 1.5px solid #cfd8dc; border-radius: 8px; font-size: 16px; outline: none; }
        #send { margin-left: 15px; padding: 0 30px; background: #263238; color: white; border-radius: 8px; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div id="app">
        <header><strong>TECHNICAL ASSISTANT</strong><br><small>Condition C: Adaptive GPT-Assisted Layer</small></header>
        <div id="chat"></div>
        <div id="typing" class="typing">Assistant is thinking...</div>
        <div id="input-area">
            <input type="text" id="query" placeholder="Ask anything about the manual..." onkeypress="if(event.key==='Enter') transmit()">
            <button id="send" onclick="transmit()">Send</button>
        </div>
    </div>
    <script>
        const sID = "RES_" + Date.now();
        let logs = [];

        function print(role, txt) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${role}`;
            d.innerText = txt;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        async function transmit() {
            const q = document.getElementById('query');
            const val = q.value.trim();
            if(!val) return;
            
            print('user', val);
            q.value = '';
            document.getElementById('typing').style.display = 'block';

            try {
                // Ensure this path matches the server route exactly
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val, sessionId: sID, history: logs})
                });

                if (!res.ok) throw new Error("Server Error");

                const data = await res.json();
                document.getElementById('typing').style.display = 'none';
                
                if (data.reply) {
                    print('ai', data.reply);
                    logs.push({role: "user", content: val}, {role: "assistant", content: data.reply});
                }
            } catch (e) {
                document.getElementById('typing').style.display = 'none';
                print('ai', "System busy. Please ensure you are using the live Railway URL.");
                console.error("Connection Failed:", e);
            }
        }

        window.onload = () => print('ai', "I am ready. You can ask me questions about any part of the manual.");
    </script>
</body>
</html>
